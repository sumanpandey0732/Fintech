kind = "mobile"
previewPath = "/"
title = "CashBuddy Nepal Pro"
version = "1.0.0"
id = "artifacts/cashbuddy-nepal"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24519

[services.development]
run = "pnpm --filter @workspace/cashbuddy-nepal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cashbuddy-nepal", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cashbuddy-nepal", "run", "serve" ]

[services.env]
PORT = "24519"
BASE_PATH = "/"
